name: Mirror to wborecki/azul-travels

# Espelha toda publicação (push de branches e tags) deste repositório
# (Solutions-in-BI/azul-travels) para wborecki/azul-travels.
#
# Anti-loop:
#   * O job só roda quando `github.repository == 'Solutions-in-BI/azul-travels'`.
#     Se este mesmo arquivo acabar presente em wborecki/azul-travels (por ter
#     sido espelhado), o job é ignorado lá — portanto não há republicação
#     de volta e nenhum ciclo é formado.

on:
  push:
    branches: ['**']
    tags: ['**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mirror-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    name: Push mirror
    if: github.repository == 'Solutions-in-BI/azul-travels'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (mirror clone)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to wborecki/azul-travels
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${MIRROR_TOKEN}" ]; then
            echo "::error::Secret MIRROR_TOKEN não configurado. Crie um PAT com permissão de escrita em wborecki/azul-travels e adicione como MIRROR_TOKEN."
            exit 1
          fi

          # Evita embutir o token na URL do remote (que poderia vazar
          # em mensagens de erro). O header Authorization é lido de um
          # arquivo local com permissões restritas, através de
          # `http.extraheader`.
          git remote add mirror "https://github.com/wborecki/azul-travels.git"

          auth_header_file="$(mktemp)"
          chmod 600 "${auth_header_file}"
          printf 'AUTHORIZATION: basic %s\n' \
            "$(printf 'x-access-token:%s' "${MIRROR_TOKEN}" | base64 -w0)" \
            > "${auth_header_file}"
          trap 'rm -f "${auth_header_file}"' EXIT

          # Empurra branches e tags preservando histórico. Não usamos
          # `--mirror` para evitar apagar refs que só existam no destino.
          git -c "http.https://github.com/wborecki/azul-travels.git.extraheader=$(cat "${auth_header_file}")" \
            push mirror --prune "refs/heads/*:refs/heads/*"
          git -c "http.https://github.com/wborecki/azul-travels.git.extraheader=$(cat "${auth_header_file}")" \
            push mirror "refs/tags/*:refs/tags/*"
